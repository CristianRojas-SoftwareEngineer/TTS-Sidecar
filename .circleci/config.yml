version: 2.1

orbs:
  python: circleci/python@2.1.1

jobs:
  build-windows:
    docker:
      - image: cimg/python:3.13
    parameters:
      py_version:
        type: string
    steps:
      - checkout
      - python/install-packages:
          package-manager: pip
          pip-dependency-file: requirements.txt
      - run:
          name: Install Nuitka
          command: pip install nuitka==2.6.8
      - run:
          name: Build Windows
          command: python scripts/build_windows.py
      - store_artifacts:
          path: bin/win32-x64/tts-sidecar.exe
          destination: tts-sidecar-win32-x64.exe

  build-linux-x64:
    docker:
      - image: cimg/python:3.13
    parameters:
      py_version:
        type: string
    steps:
      - checkout
      - python/install-packages:
          package-manager: pip
          pip-dependency-file: requirements.txt
      - run:
          name: Install Nuitka
          command: pip install nuitka==2.6.8
      - run:
          name: Install Linux dependencies
          command: |
            sudo apt-get update
            sudo apt-get install -y patchelf
      - run:
          name: Build Linux x64
          command: python scripts/build_linux.py --arch x86_64
      - store_artifacts:
          path: bin/linux-x64/tts-sidecar
          destination: tts-sidecar-linux-x64

  build-linux-arm64:
    docker:
      - image: cimg/python:3.13
    parameters:
      py_version:
        type: string
    steps:
      - checkout
      - python/install-packages:
          package-manager: pip
          pip-dependency-file: requirements.txt
      - run:
          name: Install Nuitka
          command: pip install nuitka==2.6.8
      - run:
          name: Install Linux dependencies
          command: |
            sudo apt-get update
            sudo apt-get install -y patchelf gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
      - run:
          name: Build Linux ARM64
          command: python scripts/build_linux.py --arch arm64
      - store_artifacts:
          path: bin/linux-arm64/tts-sidecar
          destination: tts-sidecar-linux-arm64

  build-darwin-x64:
    macos:
      xcode: "15.0"
    parameters:
      py_version:
        type: string
    steps:
      - checkout
      - run:
          name: Set up Python
          command: |
            python3 --version
            python3 -m pip install --upgrade pip
            pip3 install -r requirements.txt
      - run:
          name: Install Nuitka
          command: pip3 install nuitka==2.6.8
      - run:
          name: Build macOS x64
          command: python3 scripts/build_macos.py --arch x86_64
      - store_artifacts:
          path: bin/darwin-x64/tts-sidecar
          destination: tts-sidecar-darwin-x64

  build-darwin-arm64:
    macos:
      xcode: "14.0"
    steps:
      - checkout
      - run:
          name: Set up Python
          command: |
            python3 --version
            python3 -m pip install --upgrade pip
            pip3 install -r requirements.txt
      - run:
          name: Install Nuitka
          command: pip3 install nuitka==2.6.8
      - run:
          name: Build macOS ARM64
          command: python3 scripts/build_macos.py --arch arm64
      - store_artifacts:
          path: bin/darwin-arm64/tts-sidecar
          destination: tts-sidecar-darwin-arm64

workflows:
  version: 2
  build-all:
    jobs:
      - build-windows:
          matrix:
            parameters:
              py_version: ["3.13"]
      - build-linux-x64:
          matrix:
            parameters:
              py_version: ["3.13"]
      - build-linux-arm64:
          matrix:
            parameters:
              py_version: ["3.13"]
      - build-darwin-x64:
          matrix:
            parameters:
              py_version: ["3.13"]
      - build-darwin-arm64
