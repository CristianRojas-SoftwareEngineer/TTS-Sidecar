# TTS Sidecar Configuration
# Este archivo se carga automaticamente si existe en la misma carpeta que el binario.
# Usa --config <ruta> para especificar otro archivo.

# Ruta al modelo ONNX de XTTS v2
model_path = "models/xtts/model.onnx"

# Ruta al directorio de voces clonadas
voices_path = "voices/"

# Dispositivo de audio (None = predeterminado del sistema)
# audio_device = 0

# Volumen de reproduccion (0.0 - 1.0)
volume = 1.0

# Velocidad de habla (1.0 = normal)
speed = 1.0
